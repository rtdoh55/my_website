<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact | Tech Improvements</title>

  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <section class="features">
    <div class="container">

      <div class="section-title">
        <h2>Contact Us</h2>
      </div>

      <form style="max-width:700px;margin:auto;display:flex;flex-direction:column;gap:20px;">

        <input type="text" placeholder="Your Name" style="padding:15px;border-radius:10px;border:none;">

        <input type="email" placeholder="Your Email" style="padding:15px;border-radius:10px;border:none;">

        <textarea placeholder="Message" rows="6" style="padding:15px;border-radius:10px;border:none;"></textarea>

        <button class="btn primary-btn" type="submit">
          Send Message
        </button>

      </form>

    </div>
  </section>

</body>
</html>
